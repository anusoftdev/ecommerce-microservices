server:
  port: 8761

spring:
  application:
    name: service-registry

eureka:
  instance:
    hostname: localhost
  client:
    # This is the server itself — it should NOT register with itself
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/

  server:
    # Wait time before evicting unavailable instances
    eviction-interval-timer-in-ms: 5000
    # In dev, disable self-preservation so instances are evicted quickly
    enable-self-preservation: false

management:
  endpoints:
    web:
      exposure:
        include: health,info